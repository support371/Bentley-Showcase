name: Verify Production Build

on:
  push:
    branches: [main, backend-development]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify frontend, backend, and worker configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend dependencies
        run: npm install --package-lock=false

      - name: Validate backend configuration
        run: python3 scripts/backend_config_validator.py

      - name: Run architecture guard
        run: python3 scripts/architecture_guard.py

      - name: Build frontend
        run: npm run build

      - name: Verify Cloudflare Worker assets
        run: |
          test -f wrangler.toml
          test -f src/entry.py
          test -f schema.sql
          grep -q 'python_workers' wrangler.toml
          grep -q 'FastAPI' src/entry.py
          grep -q 'WorkerEntrypoint' src/entry.py
          grep -q 'VITE_API_BASE_URL' .env.example
