name: Verify Production Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify frontend and worker assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install --package-lock=false

      - name: Build frontend
        run: npm run build

      - name: Validate Cloudflare Worker files
        run: |
          test -f wrangler.toml
          test -f src/entry.py
          grep -q 'python_workers' wrangler.toml
          grep -q 'FastAPI' src/entry.py
